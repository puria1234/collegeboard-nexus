<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CollegeBoard Nexus</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div id="mainView">
      <!-- Header with Branding -->
      <header class="header">
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
          <div class="brand">
            <svg class="brand-icon" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="32" y="20" width="64" height="88" rx="8" fill="currentColor"/>
              <rect x="44" y="44" width="40" height="4" rx="2" fill="#0a0a0a"/>
              <rect x="44" y="56" width="40" height="4" rx="2" fill="#0a0a0a"/>
              <rect x="44" y="68" width="28" height="4" rx="2" fill="#0a0a0a"/>
              <circle cx="50" cy="88" r="3" fill="#0a0a0a"/>
              <circle cx="64" cy="88" r="3" fill="#0a0a0a"/>
              <circle cx="78" cy="88" r="3" fill="#0a0a0a"/>
            </svg>
            <div class="brand-text">
              <h1 class="brand-title">CollegeBoard Nexus</h1>
            </div>
          </div>
        </div>
      <div class="course-select">
        <div class="course-row">
          <label class="course-label" for="courseSelect">Course</label>
          <div class="select-wrap">
            <select id="courseSelect">
              <option value="" disabled>Select a course</option>
              <option value="ap_physics_2">AP Physics 2</option>
              <option value="ap_english_language">AP English Language &amp; Composition</option>
            </select>
            <svg class="select-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
        </div>
        <div class="course-hint" style="display: none;"></div>
      </div>
      <div class="tool-card" id="hiderCard" style="display: none;">
        <div class="tool-row" style="margin-bottom: 0; gap: 16px;">
          <div class="tool-info" style="flex: 1; min-width: 0;">
            <span class="tool-title">Answer Hider Panel</span>
            <span class="tool-subtitle">Show/hide the on-page toggle</span>
            <span class="tool-note" id="hiderNote" style="display: block; margin-top: 6px;">Use panel to hide answers</span>
          </div>
          <div style="display: flex; align-items: center; gap: 16px; flex-shrink: 0;">
            <label class="toggle">
              <input type="checkbox" id="hiderToggle">
              <span class="toggle-track"></span>
            </label>
            <span class="tool-badge" id="hiderBadge" style="width: 60px; text-align: center; flex-shrink: 0;">Visible</span>
          </div>
        </div>
      </div>
      <button class="btn btn-primary header-extract-btn" id="extractBtn" disabled style="display: none;">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          <path d="M9 14l2 2 4-4"/>
        </svg>
        Extract Questions
      </button>
    </header>

    <!-- Results Section -->
    <div class="results" id="resultsSection" style="display: none;">
      <div class="results-header">
        <div class="results-count-wrapper">
          <span class="results-label">Questions Found</span>
          <span class="results-count" id="resultsCount">0</span>
        </div>
        <div class="results-actions">
          <button class="btn btn-download" id="downloadBtn">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download
          </button>
        </div>
      </div>
<div class="preview" id="previewBox"></div>
    </div>

    <!-- Error Card -->
    <div class="card card-error" id="errorCard" style="display: none;">
      <div class="card-header">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <h2 class="card-title">Error</h2>
      </div>
      <p class="error-text" id="errorText"></p>
    </div>

    <!-- Not AP Classroom Card -->
    <div class="card card-warning" id="notApCard" style="display: none;">
      <div class="card-header">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <h2 class="card-title">Not AP Classroom</h2>
      </div>
      <p class="card-text">
        Navigate to an AP Classroom assignment or quiz page to extract questions.
      </p>
    </div>

    </div> <!-- End mainView -->


<!-- Footer -->
    <footer class="footer">
      <div class="footer-content">
        <span class="footer-text">Powered by CollegeBoard Nexus</span>
        <span class="footer-version">v1.0.0</span>
      </div>
    </footer>
  </div>

  <script src="config.local.js"></script>
  <script src="popup.js"></script>
</body>
</html>
